name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
      
      - name: Install luacheck
        run: sudo luarocks install luacheck
      
      - name: Run tests
        run: |
          cd $GITHUB_WORKSPACE
          ./tests/run-all
      
      - name: Run luacheck
        run: |
          luacheck lua/ --std lua51 --no-unused-args --no-max-line-length
